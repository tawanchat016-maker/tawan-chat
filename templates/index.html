<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ตะวัน</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #111110; color: #c8c6bf; font-family: -apple-system, sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* PIN SCREEN */
  #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; gap: 0; padding: 0 32px; }
  .pin-avatar { width: 64px; height: 64px; border-radius: 50%; background: #1e1e1c; border: 1.5px solid #3a3a38; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .pin-avatar svg { stroke: #888780; }
  .pin-name { font-size: 22px; font-weight: 500; color: #e8e6df; font-family: Georgia, serif; letter-spacing: 0.5px; margin-bottom: 6px; }
  .pin-sub { font-size: 13px; color: #5F5E5A; margin-bottom: 36px; }
  .pin-dots { display: flex; gap: 16px; margin-bottom: 40px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #1e1e1c; border: 1.5px solid #3a3a38; transition: background 0.15s; }
  .pin-dot.filled { background: #c8c6bf; border-color: #c8c6bf; }
  .pin-dot.error { background: #993C1D; border-color: #993C1D; }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-btn { height: 64px; border-radius: 16px; background: #1a1a18; border: 0.5px solid #2a2a28; color: #c8c6bf; font-size: 24px; font-family: Georgia, serif; cursor: pointer; transition: background 0.1s; user-select: none; }
  .pin-btn:active { background: #2a2a28; }
  .pin-btn.empty { background: transparent; border: none; cursor: default; }
  .pin-btn.del { font-size: 20px; }
  .pin-error { color: #D85A30; font-size: 13px; margin-top: 16px; min-height: 18px; }

  /* CHAT SCREEN */
  #chat-screen { display: none; flex-direction: column; height: 100dvh; }
  .chat-header { padding: 16px 16px 12px; background: #111110; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #222221; flex-shrink: 0; }
  .header-avatar { width: 40px; height: 40px; border-radius: 50%; background: #1e1e1c; border: 1.5px solid #3a3a38; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header-avatar svg { stroke: #888780; }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 500; color: #e8e6df; font-family: Georgia, serif; }
  .header-status { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; }
  .header-status span { font-size: 11px; color: #5F5E5A; }
  .logout-btn { background: none; border: none; cursor: pointer; padding: 4px; }
  .logout-btn svg { stroke: #5F5E5A; }

  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 10px; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .bubble-wrap { display: flex; }
  .bubble-wrap.user { justify-content: flex-end; }
  .bubble { max-width: 75%; padding: 10px 14px; font-size: 14px; line-height: 1.55; color: #c8c6bf; }
  .bubble.tawan { background: #1e1e1c; border-radius: 4px 16px 16px 16px; border: 0.5px solid #2a2a28; }
  .bubble.user { background: #2a2a1e; border-radius: 16px 4px 16px 16px; border: 0.5px solid #3a3a28; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 14px; background: #1e1e1c; border-radius: 4px 16px 16px 16px; border: 0.5px solid #2a2a28; width: fit-content; }
  .typing span { width: 7px; height: 7px; border-radius: 50%; background: #5F5E5A; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .chat-input-wrap { padding: 10px 14px 28px; background: #111110; border-top: 0.5px solid #222221; flex-shrink: 0; }
  .chat-input-inner { display: flex; align-items: center; gap: 8px; background: #1a1a18; border-radius: 24px; padding: 8px 8px 8px 16px; border: 0.5px solid #2a2a28; }
  #msg-input { flex: 1; background: none; border: none; outline: none; color: #c8c6bf; font-size: 14px; font-family: -apple-system, sans-serif; resize: none; max-height: 100px; line-height: 1.4; }
  #msg-input::placeholder { color: #444441; }
  #send-btn { width: 36px; height: 36px; border-radius: 50%; background: #3a3a28; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
  #send-btn:active { background: #4a4a38; }
  #send-btn svg { stroke: #888780; }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="pin-avatar">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </div>
  <p class="pin-name">ตะวัน</p>
  <p class="pin-sub">ใส่รหัสเพื่อเข้าใช้งาน</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-grid">
    <button class="pin-btn" onclick="pressPin('1')">1</button>
    <button class="pin-btn" onclick="pressPin('2')">2</button>
    <button class="pin-btn" onclick="pressPin('3')">3</button>
    <button class="pin-btn" onclick="pressPin('4')">4</button>
    <button class="pin-btn" onclick="pressPin('5')">5</button>
    <button class="pin-btn" onclick="pressPin('6')">6</button>
    <button class="pin-btn" onclick="pressPin('7')">7</button>
    <button class="pin-btn" onclick="pressPin('8')">8</button>
    <button class="pin-btn" onclick="pressPin('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pressPin('0')">0</button>
    <button class="pin-btn del" onclick="deletePin()">⌫</button>
  </div>
  <p class="pin-error" id="pin-error"></p>
</div>

<!-- CHAT SCREEN -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="header-avatar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    </div>
    <div class="header-info">
      <div class="header-name">ตะวัน</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>ออนไลน์อยู่</span>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input-wrap">
    <div class="chat-input-inner">
      <textarea id="msg-input" rows="1" placeholder="พิมพ์อะไรก็ได้..."></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
let pinValue = "";

function pressPin(num) {
  if (pinValue.length >= 4) return;
  pinValue += num;
  updateDots();
  if (pinValue.length === 4) submitPin();
}

function deletePin() {
  pinValue = pinValue.slice(0, -1);
  updateDots();
  document.getElementById("pin-error").textContent = "";
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById("d" + i);
    dot.className = "pin-dot" + (i < pinValue.length ? " filled" : "");
  }
}

async function submitPin() {
  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pin: pinValue })
  });
  const data = await res.json();
  if (data.success) {
    document.getElementById("pin-screen").style.display = "none";
    document.getElementById("chat-screen").style.display = "flex";
    addBubble("tawan", "ว่าไง มาแล้ว");
  } else {
    for (let i = 0; i < 4; i++) document.getElementById("d" + i).className = "pin-dot error";
    document.getElementById("pin-error").textContent = "รหัสไม่ถูกต้อง ลองใหม่นะ";
    setTimeout(() => { pinValue = ""; updateDots(); document.getElementById("pin-error").textContent = ""; }, 1000);
  }
}

async function logout() {
  await fetch("/logout", { method: "POST" });
  document.getElementById("chat-screen").style.display = "none";
  document.getElementById("pin-screen").style.display = "flex";
  document.getElementById("messages").innerHTML = "";
  pinValue = "";
  updateDots();
}

function addBubble(role, text) {
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble " + role;
  bubble.textContent = text;
  wrap.appendChild(bubble);
  document.getElementById("messages").appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "bubble-wrap tawan";
  el.id = "typing-indicator";
  el.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById("messages").appendChild(el);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

const input = document.getElementById("msg-input");
input.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 100) + "px";
});
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  input.style.height = "auto";
  addBubble("user", text);
  showTyping();
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    hideTyping();
    addBubble("tawan", data.reply);
  } catch {
    hideTyping();
    addBubble("tawan", "เฮ้ ขัดข้องนิดนึง ลองใหม่นะ");
  }
}
</script>
</body>
</html>
